<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Electronics Store</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>
<body class="bg-light">

  <div class="container py-4">
    <h2 class="text-center mb-4">Electronics Store</h2>

    <div class="row g-4">
      <div class="col-12 col-sm-6 col-lg-3">
        <div class="card h-100 shadow-sm">
          <img src="https://via.placeholder.com/300" class="card-img-top" alt="Product 1">
          <div class="card-body">
            <h5 class="card-title">Smartphone X10</h5>
            <p class="card-text">High-performance smartphone with 128GB storage.</p>
            <div class="d-flex justify-content-between">
              <button class="btn btn-primary">Add to Cart</button>
              <button class="btn btn-outline-secondary">View Details</button>
            </div>
          </div>
        </div>
      </div>
      <div class="col-12 col-sm-6 col-lg-3">
        <div class="card h-100 shadow-sm">
          <img src="https://via.placeholder.com/300" class="card-img-top" alt="Product 2">
          <div class="card-body">
            <h5 class="card-title">Wireless Headphones</h5>
            <p class="card-text">Noise-cancelling wireless headset with long battery life.</p>
            <div class="d-flex justify-content-between">
              <button class="btn btn-primary">Add to Cart</button>
              <button class="btn btn-outline-secondary">View Details</button>
            </div>
          </div>
        </div>
      </div>
      <div class="col-12 col-sm-6 col-lg-3">
        <div class="card h-100 shadow-sm">
          <img src="https://via.placeholder.com/300" class="card-img-top" alt="Product 3">
          <div class="card-body">
            <h5 class="card-title">4K Smart TV</h5>
            <p class="card-text">Ultra HD TV with built-in streaming apps.</p>
            <div class="d-flex justify-content-between">
              <button class="btn btn-primary">Add to Cart</button>
              <button class="btn btn-outline-secondary">View Details</button>
            </div>
          </div>
        </div>
      </div>
      <div class="col-12 col-sm-6 col-lg-3">
        <div class="card h-100 shadow-sm">
          <img src="https://via.placeholder.com/300" class="card-img-top" alt="Product 4">
          <div class="card-body">
            <h5 class="card-title">Gaming Laptop</h5>
            <p class="card-text">High-end gaming laptop with RTX graphics.</p>
            <div class="d-flex justify-content-between">
              <button class="btn btn-primary">Add to Cart</button>
              <button class="btn btn-outline-secondary">View Details</button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
