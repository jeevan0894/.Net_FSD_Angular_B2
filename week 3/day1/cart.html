<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce Cart Example</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            width: 700px;
            margin: 40px auto;
        }
        #cart-box {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 25px;
        }
        .product {
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
        }
        .product button {
            margin-top: 10px;
            padding: 8px 15px;
            cursor: pointer;
        }
        .msg {
            color: green;
            font-size: 14px;
            display: none;
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <div id="cart-box">
        🛒 Cart: <span id="cart-count">0</span> items
    </div>

    <!-- Product List -->
    <div id="product-list">
        <div class="product" data-id="1">
            <h3>Product 1</h3>
            <button class="add-btn">Add to Cart</button>
            <div class="msg">Added!</div>
        </div>

        <div class="product" data-id="2">
            <h3>Product 2</h3>
            <button class="add-btn">Add to Cart</button>
            <div class="msg">Added!</div>
        </div>

        <div class="product" data-id="3">
            <h3>Product 3</h3>
            <button class="add-btn">Add to Cart</button>
            <div class="msg">Added!</div>
        </div>

        <div class="product" data-id="4">
            <h3>Product 4</h3>
            <button class="add-btn">Add to Cart</button>
            <div class="msg">Added!</div>
        </div>
    </div>

    <script>
        $(document).ready(function () {

            // Event Delegation for Add-to-Cart Buttons
            $("#product-list").on("click", ".add-btn", function () {

                // Increase cart counter
                let count = parseInt($("#cart-count").text());
                $("#cart-count").text(count + 1);

                // Disable the clicked button
                $(this).prop("disabled", true);
                $(this).text("Added");

                // Show confirmation message
                $(this).siblings(".msg").fadeIn();
            });

        });
    </script>

</body>
</html>
