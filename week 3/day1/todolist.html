<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery To-Do List</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            width: 450px;
            margin: 40px auto;
        }
        #todo-container {
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 8px;
        }
        #task-input {
            width: 75%;
            padding: 8px;
        }
        #add-btn {
            padding: 8px 12px;
            cursor: pointer;
        }
        ul {
            padding: 0;
            margin-top: 20px;
        }
        li {
            list-style: none;
            padding: 10px;
            background: #f3f3f3;
            margin-bottom: 10px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .completed {
            text-decoration: line-through;
            color: gray;
        }
        .delete-btn {
            background: red;
            color: white;
            border: none;
            padding: 6px 8px;
            border-radius: 4px;
            cursor: pointer;
        }
        .counts {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h2>jQuery To-Do List</h2>

    <div id="todo-container">
        <input type="text" id="task-input" placeholder="Enter a task...">
        <button id="add-btn">Add</button>

        <ul id="task-list"></ul>

        <div class="counts">
            Total Tasks: <span id="total-count">0</span> |
            Completed: <span id="completed-count">0</span>
        </div>
    </div>

    <script>
        $(document).ready(function () {

            // Function to update counts
            function updateCounts() {
                let total = $("#task-list li").length;
                let completed = $("#task-list .completed").length;

                $("#total-count").text(total);
                $("#completed-count").text(completed);
            }

            // Add button click event
            $("#add-btn").click(function () {
                let task = $("#task-input").val().trim();

                if (task === "") return;

                // Append new task
                $("#task-list").append(`
                    <li>
                        <span class="task-text">${task}</span>
                        <button class="delete-btn">Delete</button>
                    </li>
                `);

                $("#task-input").val(""); // Clear input
                updateCounts();
            });

            // Event delegation for marking complete
            $("#task-list").on("click", ".task-text", function () {
                $(this).toggleClass("completed");
                updateCounts();
            });

            // Event delegation for deleting tasks
            $("#task-list").on("click", ".delete-btn", function () {
                $(this).parent().remove();
                updateCounts();
            });

        });
    </script>

</body>
</html>
